{% extends "base.html" %}
{% set show_sidebar = false %}

{% block content %}
<style>
    .login-container {
        min-height: 100vh;
        display: flex;
        background: #f8fafc;
        margin: -20px -40px;
        /* Offset parent padding */
    }

    .login-branding {
        flex: 1.2;
        background: #f9e7cb;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 0px;
        position: relative;
        overflow: hidden;
        border-right: 1px solid rgba(0, 0, 0, 0.05);
    }

    .branding-image {
        max-width: 100%;
        height: auto;
        border-radius: 0;
        box-shadow: none;
    }

    .login-form-side {
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding: 60px;
        background: #f9e7cb;
    }

    .login-card {
        max-width: 400px;
        width: 100%;
        margin: 0 auto;
    }

    .branding-content {
        position: relative;
        z-index: 1;
        text-align: center;
        width: 100%;
    }
</style>

<div class="login-container">
    <div class="login-branding uk-visible@m">
        <div class="branding-content">
            <img src="{{ url_for('static', filename='login.png') }}" alt="VeroBooks Branding" class="branding-image">
        </div>
    </div>

    <div class="login-form-side">
        <div class="login-card">
            <div class="uk-hidden@m uk-text-center uk-margin-large-bottom">
                <div
                    style="width: 48px; height: 48px; background: #1d4ed8; border-radius: 12px; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; margin: 0 auto 12px;">
                    V</div>
                <h2 class="uk-text-bold uk-margin-remove">VeroBooks</h2>
            </div>

            <h2 class="uk-text-bold uk-margin-small-bottom" style="color: #0a2c45;">Welcome Back</h2>
            <p class="uk-text-muted uk-margin-medium-bottom">Enter your credentials to access your workspace.</p>

            <form method="POST" action="{{ url_for('auth.login') }}" class="uk-form-stacked">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                <div class="uk-margin">
                    <label class="uk-form-label uk-text-bold" style="color: #0a2c45;">Email Address</label>
                    <div class="uk-form-controls uk-inline uk-width-1-1">
                        <span class="uk-form-icon" uk-icon="icon: mail"></span>
                        <input type="email" name="email" required class="uk-input uk-form-large uk-border-rounded"
                            placeholder="name@company.com"
                            style="background: #ffffff; border: 1px solid #d1d5db; color: #0a2c45;">
                    </div>
                </div>

                <div class="uk-margin">
                    <div class="uk-flex uk-flex-between uk-flex-middle">
                        <label class="uk-form-label uk-text-bold" style="color: #0a2c45;">Password</label>
                        <a href="#" class="uk-text-small uk-text-primary" style="color: #0a2c45;">Forgot Password?</a>
                    </div>
                    <div class="uk-form-controls uk-inline uk-width-1-1">
                        <span class="uk-form-icon" uk-icon="icon: lock"></span>
                        <input type="password" name="password" required class="uk-input uk-form-large uk-border-rounded"
                            placeholder="••••••••"
                            style="background: #ffffff; border: 1px solid #d1d5db; color: #0a2c45;">
                    </div>
                </div>

                <div class="uk-margin-medium-top">
                    <button type="submit"
                        class="uk-button uk-button-primary uk-button-large uk-width-1-1 uk-border-rounded uk-text-bold"
                        style="background: #0a2c45; border: none;">
                        Sign In
                    </button>
                </div>
            </form>

            <div class="uk-margin-large-top uk-text-center">
                <p class="uk-text-small uk-text-muted">
                    New to VeroBooks? <a href="#" class="uk-text-primary uk-text-bold" style="color: #0a2c45;">Start 30-day free trial</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
