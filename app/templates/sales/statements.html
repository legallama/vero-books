{% extends "base.html" %}

{% block content %}
<div class="uk-flex uk-flex-between uk-flex-middle uk-margin-bottom">
    <div>
        <h2 class="uk-margin-remove uk-text-bold" style="color: #1e293b;">Customer Statements</h2>
        <p class="uk-text-meta uk-margin-remove">Generate balance forward or open item statements for your customers</p>
    </div>
</div>

<div class="uk-grid-medium" uk-grid>
    <div class="uk-width-1-3@m">
        <div class="uk-card uk-card-default uk-card-body" style="border-radius: 12px; border: 1px solid #e2e8f0;">
            <h4 class="uk-text-bold uk-margin-bottom" style="color: #1e293b;">Generate Statement</h4>
            
            <form>
                <div class="uk-margin">
                    <label class="uk-form-label uk-text-bold" style="font-size: 12px; color: #475569;">Statement Type</label>
                    <div class="uk-form-controls">
                        <select class="uk-select" style="border-radius: 6px; border: 1px solid #cbd5e1;">
                            <option>Balance Forward</option>
                            <option>Open Item</option>
                            <option>Transaction Statement</option>
                        </select>
                    </div>
                </div>
                
                <div class="uk-margin">
                    <label class="uk-form-label uk-text-bold" style="font-size: 12px; color: #475569;">Customer</label>
                    <div class="uk-form-controls">
                        <select class="uk-select" style="border-radius: 6px; border: 1px solid #cbd5e1;">
                            <option value="">All Active Customers</option>
                            {% for customer in customers %}
                            <option value="{{ customer.id }}">{{ customer.display_name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>
                
                <div class="uk-margin">
                    <label class="uk-form-label uk-text-bold" style="font-size: 12px; color: #475569;">Statement Date</label>
                    <div class="uk-form-controls">
                        <input class="uk-input" type="date" value="{{ today }}" style="border-radius: 6px; border: 1px solid #cbd5e1;">
                    </div>
                </div>
                
                <div class="uk-margin-top">
                    <button type="button" class="uk-button uk-button-primary uk-width-1-1" style="border-radius: 8px; text-transform: none; font-weight: 600; background: #6366f1;">
                        Preview Statements
                    </button>
                </div>
            </form>
        </div>
    </div>
    
    <div class="uk-width-2-3@m">
        <div class="uk-card uk-card-default uk-card-body uk-flex uk-flex-center uk-flex-middle" style="border-radius: 12px; height: 100%; border: 1px dashed #cbd5e1; background: #f8fafc;">
            <div class="uk-text-center">
                <span uk-icon="icon: file-text; ratio: 2.5" style="color: #94a3b8;"></span>
                <p class="uk-text-meta uk-margin-small-top">Select statement criteria to preview customer balances.</p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
