<table class="w-full text-left">
    <thead>
        <tr class="text-slate-500 text-sm border-b border-slate-800">
            <th class="px-6 py-4 font-medium uppercase tracking-wider">Code</th>
            <th class="px-6 py-4 font-medium uppercase tracking-wider">Name</th>
            <th class="px-6 py-4 font-medium uppercase tracking-wider">Type</th>
            <th class="px-6 py-4 font-medium uppercase tracking-wider">Status</th>
            <th class="px-6 py-4 font-medium uppercase tracking-wider text-right">Balance</th>
        </tr>
    </thead>
    <tbody class="divide-y divide-slate-800/50">
        {% for acc in accounts %}
        <tr class="hover:bg-slate-800/20 transition-colors">
            <td class="px-6 py-4 font-mono text-indigo-400">{{ acc.code }}</td>
            <td class="px-6 py-4 font-medium">{{ acc.name }}</td>
            <td class="px-6 py-4">
                <span class="text-xs font-semibold px-2 py-1 rounded bg-slate-800 text-slate-400">{{ acc.type }}</span>
            </td>
            <td class="px-6 py-4">
                {% if acc.is_active %}
                <span class="flex items-center gap-1.5 text-xs text-emerald-400">
                    <span class="w-1.5 h-1.5 rounded-full bg-emerald-500"></span> Active
                </span>
                {% else %}
                <span class="text-xs text-slate-500 italic">Inactive</span>
                {% endif %}
            </td>
            <td class="px-6 py-4 text-right font-medium">$0.00</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
