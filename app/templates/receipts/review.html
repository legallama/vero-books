{% extends "base.html" %}

{% block content %}
<div class="uk-flex uk-flex-between uk-flex-middle uk-margin-bottom">
    <div>
        <h2 class="uk-margin-remove uk-text-bold" style="color: #1e293b;">Review Receipt</h2>
        <p class="uk-text-meta uk-margin-remove">{{ receipt.original_name }}</p>
    </div>
    <div class="uk-flex uk-flex-middle">
        <form action="{{ url_for('receipts.delete', receipt_id=receipt.id) }}" method="POST" onsubmit="return confirm('Delete this receipt permanently?')" class="uk-margin-small-right">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <button type="submit" class="uk-button uk-button-danger uk-button-small" style="border-radius: 6px; text-transform: none; font-weight: 600; background: #fee2e2; color: #b91c1c; border: 1px solid #fecaca;">
                <span uk-icon="icon: trash; ratio: 0.8" class="uk-margin-small-right"></span> Delete
            </button>
        </form>
        <a href="{{ url_for('receipts.index') }}" class="uk-button uk-button-default uk-button-small" style="border-radius: 6px; text-transform: none; font-weight: 600;">
            <span uk-icon="icon: arrow-left; ratio: 0.8" class="uk-margin-small-right"></span> Back to List
        </a>
    </div>
</div>

<div class="uk-grid-small" uk-grid>
    <!-- Left: Receipt Image -->
    <div class="uk-width-2-3@m">
        <div class="uk-card uk-card-default uk-card-body uk-flex uk-flex-center uk-flex-middle" style="border-radius: 12px; border: 1px solid #e2e8f0; min-height: 75vh; max-height: 85vh; overflow: auto; background: #f1f5f9; position: relative;">
            <div style="position: absolute; top: 10px; right: 10px; z-index: 10;">
                <button class="uk-button uk-button-default uk-button-small" style="background: white; border-radius: 4px;" onclick="rotateImage()">
                    <span uk-icon="icon: refresh; ratio: 0.8"></span>
                </button>
            </div>
            <img id="receipt-img" src="{{ url_for('static', filename='uploads/receipts/' + receipt.filename) }}" style="max-width: 100%; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-radius: 4px; transition: transform 0.3s ease;">
        </div>
    </div>
    
    <!-- Right: Details Form -->
    <div class="uk-width-1-3@m">
        <div class="uk-card uk-card-default uk-card-body" style="border-radius: 12px; border: 1px solid #e2e8f0;">
            <form action="{{ url_for('receipts.review', receipt_id=receipt.id) }}" method="POST">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                
                <div class="uk-margin">
                    <label class="uk-form-label uk-text-bold" style="font-size: 11px; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em;">Vendor Name</label>
                    <div class="uk-inline uk-width-1-1">
                        <span class="uk-form-icon" uk-icon="icon: user; ratio: 0.8"></span>
                        <input class="uk-input" type="text" name="vendor_name" value="{{ receipt.vendor_name or '' }}" placeholder="Who did you pay?">
                    </div>
                </div>
                
                <div class="uk-margin">
                    <label class="uk-form-label uk-text-bold" style="font-size: 11px; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em;">Date</label>
                    <div class="uk-inline uk-width-1-1">
                        <span class="uk-form-icon" uk-icon="icon: calendar; ratio: 0.8"></span>
                        <input class="uk-input" type="date" name="receipt_date" value="{{ receipt.receipt_date or '' }}">
                    </div>
                </div>
                
                <div class="uk-margin">
                    <label class="uk-form-label uk-text-bold" style="font-size: 11px; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em;">Total Amount</label>
                    <div class="uk-inline uk-width-1-1">
                        <span class="uk-form-icon" style="font-size: 14px; font-weight: 700; color: #1e293b;">$</span>
                        <input class="uk-input uk-text-bold" type="number" step="0.01" name="amount" value="{{ receipt.amount or '' }}" placeholder="0.00" style="font-size: 16px;">
                    </div>
                </div>
                
                <div class="uk-margin">
                    <label class="uk-form-label uk-text-bold" style="font-size: 11px; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em;">Expense Account</label>
                    <select class="uk-select" name="account_id">
                        <option value="">Select account...</option>
                        {% for account in accounts %}
                        <option value="{{ account.id }}">{{ account.code }} - {{ account.name }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="uk-margin-large-top">
                    <button type="submit" name="save" class="uk-button uk-button-default uk-width-1-1 uk-margin-small-bottom" style="border-radius: 8px; text-transform: none; font-weight: 600; height: 44px;">Save Progress</button>
                    <button type="submit" name="post" class="uk-button uk-button-primary uk-width-1-1" style="border-radius: 8px; text-transform: none; font-weight: 600; height: 44px; background: #6366f1;">Confirm & Create Entry</button>
                </div>
            </form>
            
            <div class="uk-margin-top uk-padding-small uk-background-muted" style="border-radius: 8px; border: 1px solid #e2e8f0;">
                <div class="uk-flex uk-flex-middle">
                    <span uk-icon="icon: info; ratio: 0.8" class="uk-margin-small-right" style="color: #3b82f6;"></span>
                    <span style="font-size: 11px; color: #64748b;">Confirming this receipt will automatically create a journal entry in your books.</span>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    let rotation = 0;
    function rotateImage() {
        rotation = (rotation + 90) % 360;
        document.getElementById('receipt-img').style.transform = `rotate(${rotation}deg)`;
    }
</script>
{% endblock %}
