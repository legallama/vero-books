{% extends "base.html" %}

{% block content %}
<div class="uk-flex uk-flex-between uk-flex-middle uk-margin-bottom">
    <div>
        <h2 class="uk-margin-remove uk-text-bold" style="color: #1e293b;">New Inventory Adjustment</h2>
        <p class="uk-text-meta uk-margin-remove">Record shrinkage, damage, or manual counts</p>
    </div>
    <div>
        <a href="{{ url_for('inventory.dashboard') }}" class="uk-button uk-button-default" style="border-radius: 8px; text-transform: none; font-weight: 600;">
            Cancel
        </a>
    </div>
</div>

<form method="POST" action="{{ url_for('inventory.new_adjustment') }}">
    <div class="uk-grid-medium" uk-grid>
        <div class="uk-width-2-3@m">
            <div class="uk-card uk-card-default uk-card-body" style="border-radius: 12px; border: 1px solid #e2e8f0;">
                <h4 class="uk-text-bold uk-margin-bottom" style="color: #1e293b;">Adjust Items</h4>
                
                <table class="uk-table uk-table-divider uk-table-small" id="adjustment-table">
                    <thead>
                        <tr>
                            <th class="uk-text-bold" style="font-size: 12px; color: #64748b;">PRODUCT</th>
                            <th class="uk-width-small uk-text-bold" style="font-size: 12px; color: #64748b;">CURRENT QTY</th>
                            <th class="uk-width-small uk-text-bold" style="font-size: 12px; color: #64748b;">ADJUSTMENT (+/-)</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody id="lines-container">
                        <tr class="adjustment-line">
                            <td>
                                <select class="uk-select product-select" name="product_id[]" style="border-radius: 6px; border: 1px solid #cbd5e1;" required>
                                    <option value="" disabled selected>Select a product...</option>
                                    {% for product in products %}
                                    <option value="{{ product.id }}" data-qty="{{ product.quantity_on_hand }}">{{ product.name }} (SKU: {{ product.sku }})</option>
                                    {% endfor %}
                                </select>
                            </td>
                            <td>
                                <input type="text" class="uk-input current-qty" value="0.00" disabled style="border-radius: 6px; background: #f8fafc; border: 1px solid #e2e8f0;">
                            </td>
                            <td>
                                <input type="number" step="0.01" class="uk-input" name="quantity_adjusted[]" value="0" style="border-radius: 6px; border: 1px solid #cbd5e1;" required>
                            </td>
                            <td class="uk-text-center uk-table-middle">
                                <button type="button" class="uk-button uk-button-text uk-text-danger remove-line" uk-icon="icon: trash"></button>
                            </td>
                        </tr>
                    </tbody>
                </table>
                
                <div class="uk-margin-top">
                    <button type="button" id="add-line" class="uk-button uk-button-default uk-button-small" style="border-radius: 6px; text-transform: none;">
                        <span uk-icon="icon: plus; ratio: 0.7"></span> Add Line
                    </button>
                </div>
            </div>
        </div>
        
        <div class="uk-width-1-3@m">
            <div class="uk-card uk-card-default uk-card-body" style="border-radius: 12px; border: 1px solid #e2e8f0;">
                <h4 class="uk-text-bold uk-margin-bottom" style="color: #1e293b;">Adjustment Details</h4>
                
                <div class="uk-margin">
                    <label class="uk-form-label uk-text-bold" style="font-size: 12px; color: #475569;">Date</label>
                    <div class="uk-form-controls">
                        <input class="uk-input" type="date" name="date" required style="border-radius: 6px; border: 1px solid #cbd5e1;">
                    </div>
                </div>
                
                <div class="uk-margin">
                    <label class="uk-form-label uk-text-bold" style="font-size: 12px; color: #475569;">Reason</label>
                    <div class="uk-form-controls">
                        <select class="uk-select" name="reason" style="border-radius: 6px; border: 1px solid #cbd5e1;" required>
                            <option value="SHRINKAGE">Shrinkage / Loss</option>
                            <option value="DAMAGE">Damage</option>
                            <option value="PHYSICAL_COUNT">Physical Count Correction</option>
                            <option value="PROMOTIONAL">Promotional Giveaway</option>
                        </select>
                    </div>
                </div>
                
                <div class="uk-margin">
                    <label class="uk-form-label uk-text-bold" style="font-size: 12px; color: #475569;">Adjustment Account</label>
                    <div class="uk-form-controls">
                        <select class="uk-select" name="adjustment_account_id" style="border-radius: 6px; border: 1px solid #cbd5e1;" required>
                            <option value="" disabled selected>Select expense account...</option>
                            {% for account in expense_accounts %}
                            <option value="{{ account.id }}">{{ account.name }}</option>
                            {% endfor %}
                        </select>
                        <p class="uk-text-meta uk-margin-small-top" style="font-size: 11px;">The account to charge the value of the adjustment to.</p>
                    </div>
                </div>
                
                <div class="uk-margin">
                    <label class="uk-form-label uk-text-bold" style="font-size: 12px; color: #475569;">Notes</label>
                    <div class="uk-form-controls">
                        <textarea class="uk-textarea" name="notes" rows="3" style="border-radius: 6px; border: 1px solid #cbd5e1;"></textarea>
                    </div>
                </div>
                
                <div class="uk-margin-top uk-text-right">
                    <button type="submit" class="uk-button uk-button-primary uk-width-1-1" style="border-radius: 8px; text-transform: none; font-weight: 600; background: #6366f1;">
                        Save Adjustment
                    </button>
                </div>
            </div>
        </div>
    </div>
</form>

<script>
document.addEventListener('DOMContentLoaded', function() {
    // Set default date to today
    document.querySelector('input[type="date"]').valueAsDate = new Date();
    
    // Add new line
    document.getElementById('add-line').addEventListener('click', function() {
        const container = document.getElementById('lines-container');
        const firstLine = container.querySelector('.adjustment-line');
        const newLine = firstLine.cloneNode(true);
        
        // Reset values
        newLine.querySelector('select').value = '';
        newLine.querySelector('.current-qty').value = '0.00';
        newLine.querySelector('input[name="quantity_adjusted[]"]').value = '0';
        
        container.appendChild(newLine);
        attachEventListeners(newLine);
    });
    
    function attachEventListeners(line) {
        // Update current qty when product changes
        const select = line.querySelector('.product-select');
        select.addEventListener('change', function() {
            const selectedOption = this.options[this.selectedIndex];
            const qty = selectedOption.getAttribute('data-qty');
            line.querySelector('.current-qty').value = qty || '0.00';
        });
        
        // Remove line
        const removeBtn = line.querySelector('.remove-line');
        removeBtn.addEventListener('click', function() {
            if (document.querySelectorAll('.adjustment-line').length > 1) {
                line.remove();
            }
        });
    }
    
    // Attach to initial line
    attachEventListeners(document.querySelector('.adjustment-line'));
});
</script>
{% endblock %}
