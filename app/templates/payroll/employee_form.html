{% extends "base.html" %}

{% block content %}
<div class="uk-section uk-section-xsmall">
    <div class="uk-flex uk-flex-between uk-flex-middle uk-margin-large-bottom">
        <div>
            <h1 class="uk-h2 uk-text-bold">Add New Employee</h1>
            <p class="uk-text-meta">Set up personal details and tax settings for your new team member.</p>
        </div>
        <a href="{{ url_for('payroll.index') }}" class="uk-button uk-button-default uk-border-rounded">Cancel</a>
    </div>

    <div class="uk-card uk-card-default uk-border-rounded" style="max-width: 800px; margin: 0 auto;">
        <form method="POST" class="uk-form-stacked uk-padding">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            
            <div class="uk-grid-medium" uk-grid>
                <!-- Personal Info -->
                <div class="uk-width-1-2@m">
                    <label class="uk-form-label uk-text-bold">First Name</label>
                    <input class="uk-input uk-border-rounded" type="text" name="first_name" required placeholder="e.g. John">
                </div>
                <div class="uk-width-1-2@m">
                    <label class="uk-form-label uk-text-bold">Last Name</label>
                    <input class="uk-input uk-border-rounded" type="text" name="last_name" required placeholder="e.g. Doe">
                </div>
                
                <div class="uk-width-1-1">
                    <label class="uk-form-label uk-text-bold">Email Address</label>
                    <input class="uk-input uk-border-rounded" type="email" name="email" placeholder="john.doe@example.com">
                </div>

                <div class="uk-width-1-2@m">
                    <label class="uk-form-label uk-text-bold">SSN (Last 4)</label>
                    <input class="uk-input uk-border-rounded" type="text" name="ssn_last4" maxlength="4" placeholder="0000">
                </div>
                <div class="uk-width-1-2@m">
                    <label class="uk-form-label uk-text-bold">Hire Date</label>
                    <input class="uk-input uk-border-rounded" type="date" name="hired_at">
                </div>

                <!-- Pay Settings -->
                <div class="uk-width-1-1 uk-margin-medium-top">
                    <h4 class="uk-text-bold uk-heading-bullet">Compensation</h4>
                </div>

                <div class="uk-width-1-3@m">
                    <label class="uk-form-label uk-text-bold">Pay Type</label>
                    <select class="uk-select uk-border-rounded" name="pay_type">
                        <option value="SALARY">Salary</option>
                        <option value="HOURLY">Hourly</option>
                    </select>
                </div>
                <div class="uk-width-1-3@m">
                    <label class="uk-form-label uk-text-bold">Rate (Annual/Hourly)</label>
                    <div class="uk-inline uk-width-1-1">
                        <span class="uk-form-icon" uk-icon="icon: sign-out; ratio: 0.8" style="transform: rotate(90deg);"></span>
                        <input class="uk-input uk-border-rounded" type="number" name="pay_rate" step="0.01" required placeholder="50000.00">
                    </div>
                </div>
                <div class="uk-width-1-3@m">
                    <label class="uk-form-label uk-text-bold">Frequency</label>
                    <select class="uk-select uk-border-rounded" name="pay_frequency">
                        <option value="WEEKLY">Weekly</option>
                        <option value="BIWEEKLY" selected>Bi-Weekly</option>
                        <option value="MONTHLY">Monthly</option>
                    </select>
                </div>

                <!-- Tax Settings -->
                <div class="uk-width-1-1 uk-margin-medium-top">
                    <h4 class="uk-text-bold uk-heading-bullet">Tax Withholding</h4>
                </div>

                <div class="uk-width-1-2@m">
                    <label class="uk-form-label uk-text-bold">Filing Status</label>
                    <select class="uk-select uk-border-rounded" name="filing_status">
                        <option value="SINGLE">Single</option>
                        <option value="MARRIED_JOINT">Married Filing Jointly</option>
                        <option value="HEAD_OF_HOUSE">Head of Household</option>
                    </select>
                </div>
                <div class="uk-width-1-2@m">
                    <label class="uk-form-label uk-text-bold">Federal Allowances</label>
                    <input class="uk-input uk-border-rounded" type="number" name="federal_allowances" value="0">
                </div>
            </div>

            <div class="uk-margin-large-top uk-text-right">
                <button type="submit" class="uk-button uk-button-primary uk-border-rounded" style="background: #4338ca; min-width: 150px;">Save Employee</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
