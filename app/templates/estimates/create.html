{% extends "base.html" %}

{% block content %}
<div id="estimate-app">
    <div class="uk-flex uk-flex-between uk-flex-bottom uk-margin-large-bottom">
        <div>
            <h1 class="uk-heading-small uk-margin-remove-bottom">New Estimate</h1>
            <p class="uk-text-meta">Create a professional proposal or quote for your client</p>
        </div>
        <div class="uk-text-right">
            <p class="uk-text-meta uk-text-uppercase uk-margin-remove">Quote Total</p>
            <h2 class="uk-margin-remove-top uk-text-bold uk-text-warning">$[[ totalAmount.toFixed(2) ]]</h2>
        </div>
    </div>

    <form method="POST" action="{{ url_for('estimates.create') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        
        <div class="uk-card uk-card-default uk-card-body uk-margin-bottom">
            <div class="uk-grid-small" uk-grid>
                <div class="uk-width-1-2@s">
                    <label class="uk-form-label uk-text-bold">Select Customer</label>
                    <select name="customer_id" required class="uk-select">
                        <option value="">Choose a customer...</option>
                        {% for customer in customers %}
                        <option value="{{ customer.id }}">{{ customer.display_name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="uk-width-1-4@s">
                    <label class="uk-form-label uk-text-bold">Date</label>
                    <input type="date" name="issue_date" value="{{ today }}" required class="uk-input">
                </div>
                <div class="uk-width-1-4@s">
                    <label class="uk-form-label uk-text-bold">Expiry Date</label>
                    <input type="date" name="expiry_date" class="uk-input">
                </div>
            </div>
        </div>

        <div class="uk-card uk-card-default uk-card-body">
            <table class="uk-table uk-table-middle uk-table-divider">
                <thead>
                    <tr>
                        <th class="uk-width-expand">Scope of Work / Item Description</th>
                        <th class="uk-width-small uk-text-center">Rate</th>
                        <th class="uk-width-small uk-text-center">Qty</th>
                        <th class="uk-width-small uk-text-right">Amount</th>
                        <th class="uk-table-shrink"></th>
                    </tr>
                </thead>
                <tbody>
                    <tr v-for="(line, index) in lines" :key="index">
                        <td>
                            <input type="text" :name="`lines[${index}][description]`" v-model="line.description" required placeholder="Detailed description..." class="uk-input">
                        </td>
                        <td>
                            <input type="number" step="0.01" :name="`lines[${index}][unit_price]`" v-model.number="line.unit_price" class="uk-input uk-text-center">
                        </td>
                        <td>
                            <input type="number" step="0.01" :name="`lines[${index}][quantity]`" v-model.number="line.quantity" class="uk-input uk-text-center">
                        </td>
                        <td class="uk-text-right uk-text-bold uk-text-warning">
                            $[[ (line.quantity * line.unit_price).toFixed(2) ]]
                        </td>
                        <td>
                            <button type="button" @click="removeLine(index)" class="uk-icon-button uk-button-danger" uk-icon="trash" v-if="lines.length > 1"></button>
                        </td>
                    </tr>
                </tbody>
            </table>
            
            <div class="uk-margin-top">
                <button type="button" @click="addLine" class="uk-button uk-button-text uk-text-primary">+ Add Line Item</button>
            </div>
        </div>

        <div class="uk-margin-large-top uk-text-right">
            <a href="{{ url_for('estimates.index') }}" class="uk-button uk-button-default uk-margin-right">Cancel</a>
            <button type="submit" class="uk-button uk-button-primary uk-button-large">Save & Send Estimate</button>
        </div>
    </form>
</div>

<script>
    const { createApp, ref, computed } = Vue;

    createApp({
        delimiters: ['[[', ']]'],
        setup() {
            const lines = ref([
                { description: '', quantity: 1, unit_price: 0 }
            ]);

            const addLine = () => lines.value.push({ description: '', quantity: 1, unit_price: 0 });
            const removeLine = (index) => lines.value.splice(index, 1);

            const totalAmount = computed(() => {
                return lines.value.reduce((sum, line) => sum + (line.quantity * line.unit_price || 0), 0);
            });

            return { lines, addLine, removeLine, totalAmount };
        }
    }).mount('#estimate-app');
</script>
{% endblock %}
