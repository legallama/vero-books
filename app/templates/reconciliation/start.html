{% extends "base.html" %}

{% block content %}
<div class="uk-flex uk-flex-center">
    <div class="uk-width-xlarge">
        <div class="uk-card uk-card-default uk-card-body" style="border-radius: 16px; border: 1px solid #e2e8f0; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);">
            <div class="uk-text-center uk-margin-medium-bottom">
                <div class="uk-margin-auto" style="width: 56px; height: 56px; background: #eef2ff; border-radius: 14px; display: flex; align-items: center; justify-content: center; margin-bottom: 16px;">
                    <span uk-icon="icon: history; ratio: 1.5" style="color: #6366f1;"></span>
                </div>
                <h2 class="uk-margin-remove uk-text-bold" style="color: #1e293b;">Reconcile {{ account.name }}</h2>
                <p class="uk-text-meta">Enter your statement information to begin</p>
            </div>

            <form action="{{ url_for('reconciliation.start', account_id=account.id) }}" method="POST" class="uk-form-stacked">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                
                <div class="uk-margin">
                    <label class="uk-form-label uk-text-bold" style="font-size: 13px; color: #475569;">Statement Ending Date</label>
                    <div class="uk-inline uk-width-1-1">
                        <span class="uk-form-icon" uk-icon="icon: calendar"></span>
                        <input class="uk-input" type="date" name="statement_date" required style="border-radius: 8px;">
                    </div>
                </div>

                <div class="uk-margin">
                    <label class="uk-form-label uk-text-bold" style="font-size: 13px; color: #475569;">Ending Balance</label>
                    <div class="uk-inline uk-width-1-1">
                        <span class="uk-form-icon" style="font-size: 16px; font-weight: 700; color: #1e293b;">$</span>
                        <input class="uk-input" type="number" step="0.01" name="statement_balance" placeholder="0.00" required style="border-radius: 8px; font-size: 18px; font-weight: 600;">
                    </div>
                    <p class="uk-text-meta uk-margin-small-top" style="font-size: 11px;">Enter the ending balance shown on your bank statement.</p>
                </div>

                <div class="uk-padding-small uk-background-muted uk-margin-medium-top" style="border-radius: 8px; border: 1px solid #f1f5f9;">
                    <div class="uk-flex uk-flex-between uk-flex-middle">
                        <span style="font-size: 13px; color: #64748b;">Starting Balance</span>
                        <span class="uk-text-bold" style="font-size: 14px; color: #1e293b;">${{ "%.2f"|format(suggested_start) }}</span>
                    </div>
                </div>

                <div class="uk-margin-large-top">
                    <button type="submit" class="uk-button uk-button-primary uk-width-1-1" style="border-radius: 8px; text-transform: none; font-weight: 700; height: 48px; background: #6366f1; font-size: 16px;">Start Reconciling</button>
                    <a href="{{ url_for('reconciliation.index') }}" class="uk-button uk-button-text uk-width-1-1 uk-margin-small-top" style="text-transform: none; font-size: 13px;">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
