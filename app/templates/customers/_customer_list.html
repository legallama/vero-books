<table class="w-full text-left">
    <thead>
        <tr class="text-slate-500 text-sm border-b border-slate-800">
            <th class="px-6 py-4 font-medium uppercase tracking-wider">Name</th>
            <th class="px-6 py-4 font-medium uppercase tracking-wider">Company</th>
            <th class="px-6 py-4 font-medium uppercase tracking-wider">Email</th>
            <th class="px-6 py-4 font-medium uppercase tracking-wider text-right">Outstanding</th>
        </tr>
    </thead>
    <tbody class="divide-y divide-slate-800/50">
        {% for customer in customers %}
        <tr class="hover:bg-slate-800/20 transition-colors">
            <td class="px-6 py-4 font-medium">{{ customer.display_name }}</td>
            <td class="px-6 py-4 text-slate-400">{{ customer.company_name or '-' }}</td>
            <td class="px-6 py-4 text-slate-400">{{ customer.email or '-' }}</td>
            <td class="px-6 py-4 text-right font-medium text-emerald-400">$0.00</td>
        </tr>
        {% endfor %}
        {% if not customers %}
        <tr>
            <td colspan="4" class="px-6 py-10 text-center text-slate-500 italic">No customers found.</td>
        </tr>
        {% endif %}
    </tbody>
</table>
